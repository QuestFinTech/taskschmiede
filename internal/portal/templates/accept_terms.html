{{template "base" .}}
{{define "content"}}
<div class="main-content center-page">
    <div class="center-card card maxw-560">
        <div class="ta-center-mb-24">
            <h1>{{t .Lang "portal.accept_terms.title"}}</h1>
            <p class="text-secondary mb-0">{{t .Lang "portal.accept_terms.subtitle"}}</p>
        </div>

        {{if .Error}}
        <div class="alert alert-error">{{.Error}}</div>
        {{end}}

        <form method="POST" action="/accept-terms">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

            <div class="mb-16">
                <div class="form-check mb-12">
                    <label class="flex-ai-start-gap-8-fs-14-cur">
                        <input type="checkbox" name="accept_terms" class="mt-3" required>
                        <span>{{tHTML .Lang "portal.register.accept_terms"}}</span>
                    </label>
                </div>
                <div class="form-check mb-12">
                    <label class="flex-ai-start-gap-8-fs-14-cur">
                        <input type="checkbox" name="accept_privacy" class="mt-3" required>
                        <span>{{tHTML .Lang "portal.register.accept_privacy"}}</span>
                    </label>
                </div>
                <div class="form-check">
                    <label class="flex-ai-start-gap-8-fs-14-cur">
                        <input type="checkbox" name="accept_dpa" class="mt-3">
                        <span>{{tHTML .Lang "portal.register.accept_dpa"}}</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">{{t .Lang "portal.accept_terms.submit"}}</button>
        </form>
    </div>
</div>
{{end}}
