{{template "base" .}}
{{define "content"}}
<div class="main-content center-page">
    <div class="center-card card">
        <div class="ta-center-mb-24">
            <h1>{{t .Lang "portal.forgot_password.title"}}</h1>
            <p class="text-secondary mb-0">{{t .Lang "portal.forgot_password.subtitle"}}</p>
        </div>

        {{if .Error}}
        <div class="alert alert-error">{{.Error}}</div>
        {{end}}

        {{if .Success}}
        <div class="alert alert-success">{{.Success}}</div>
        {{end}}

        <form method="POST" action="/forgot-password">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
            <div class="form-group">
                <label for="email">{{t .Lang "common.label.email"}}</label>
                <input type="email" id="email" name="email" required autofocus placeholder="{{t .Lang "common.placeholder.email"}}">
            </div>
            <button type="submit" class="btn btn-primary btn-block">{{t .Lang "portal.forgot_password.submit"}}</button>
        </form>

        <div class="section-divider-center">
            <a href="/login">{{t .Lang "common.back_to_sign_in"}}</a>
        </div>
    </div>
</div>
{{end}}
