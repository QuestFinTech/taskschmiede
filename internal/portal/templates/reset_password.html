{{template "base" .}}
{{define "content"}}
<div class="main-content center-page">
    <div class="center-card card">
        <div class="ta-center-mb-24">
            <h1>{{t .Lang "portal.reset_password.title"}}</h1>
            <p class="text-secondary mb-0">{{t .Lang "portal.reset_password.subtitle"}}</p>
        </div>

        {{if .Error}}
        <div class="alert alert-error">{{.Error}}</div>
        {{end}}

        {{if .Data}}
            {{if index .Data "ShowForm"}}
                <form method="POST" action="/reset-password">
                    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                    <input type="hidden" name="email" value="{{index .Data "Email"}}">
                    <input type="hidden" name="code" value="{{index .Data "Code"}}">
                    <input type="hidden" name="action" value="reset">
                    <div class="form-group">
                        <label for="new_password">{{t .Lang "common.label.new_password"}} <span class="label-hint">({{t .Lang "common.password_hint"}})</span></label>
                        <input type="password" id="new_password" name="new_password" required autofocus placeholder="{{t .Lang "common.placeholder.choose_new_password"}}">
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">{{t .Lang "common.label.confirm_password"}}</label>
                        <input type="password" id="confirm_password" name="confirm_password" required placeholder="{{t .Lang "common.placeholder.confirm_new_password"}}">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">{{t .Lang "portal.reset_password.submit"}}</button>
                </form>
            {{else}}
                <form method="POST" action="/reset-password">
                    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                    <div class="form-group">
                        <label for="email">{{t .Lang "common.label.email"}}</label>
                        <input type="email" id="email" name="email" required placeholder="{{t .Lang "common.placeholder.email"}}" value="{{index .Data "Email"}}">
                    </div>
                    <div class="form-group">
                        <label for="code">{{t .Lang "portal.reset_password.label_reset_code"}}</label>
                        <input type="text" id="code" name="code" required placeholder="{{t .Lang "common.placeholder.reset_code"}}" value="{{index .Data "Code"}}">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">{{t .Lang "common.continue"}}</button>
                </form>
            {{end}}
        {{end}}

        <div class="section-divider-center">
            <a href="/login">{{t .Lang "common.back_to_sign_in"}}</a>
        </div>
    </div>
</div>
{{end}}
