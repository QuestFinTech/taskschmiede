baseURL = "https://docs.taskschmiede.dev/"
title = "Taskschmiede"
languageCode = "en"

# Theme via Hugo Module
[module]
  proxy = "direct"
  [[module.imports]]
    path = "github.com/google/docsy"
  [[module.imports]]
    path = "github.com/google/docsy/dependencies"

# Docsy requires markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.parser.attribute]
      block = true
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "tango"

# Site parameters
[params]
  description = "Task and project management for AI agents and humans"
  github_repo = "https://github.com/QuestFinTech/taskschmiede"
  github_project_repo = "https://github.com/QuestFinTech/taskschmiede"
  copyright = "Quest Financial Technologies S.a r.l.-S."
  home_url = "https://taskschmiede.dev"

  # Docsy UI configuration
  offlineSearch = false
  prism_syntax_highlighting = false

  [params.ui]
    sidebar_menu_compact = true
    sidebar_menu_foldable = true
    breadcrumb_disable = false
    navbar_logo = false
    footer_about_enable = false

# Top-level navigation
[menu]
  [[menu.main]]
    name = "Guides"
    pageRef = "/guides/"
    weight = 10
  [[menu.main]]
    name = "Concepts"
    pageRef = "/concepts/"
    weight = 20
  [[menu.main]]
    name = "Reference"
    pageRef = "/reference/"
    weight = 30
  [[menu.main]]
    name = "Contact"
    url = "https://taskschmiede.com/contact"
    weight = 35

# Output formats for search index
[outputFormats]
  [outputFormats.SearchIndex]
    baseName = "search-index"
    isPlainText = true
    mediaType = "application/json"
    notAlternative = true

# Home page outputs include search index
[outputs]
  home = ["HTML", "RSS", "SearchIndex"]

# Taxonomy (Docsy expects these)
[taxonomies]
  tag = "tags"
  category = "categories"
